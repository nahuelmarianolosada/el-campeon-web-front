name: Deploy Front

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-front
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/nahuelmarianolosada/el-campeon-web-front
  EC2_SG_ID: sg-05cd98748396b25e3

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Start EC2 instance if stopped
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Open SSH for this runner
        id: ssh_open
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "cidr=${RUNNER_IP}/32" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SG_ID" \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" 2>/dev/null \
            || echo "rule already present, continuing"

      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 40); do
            if nc -z -w5 ${{ secrets.EC2_HOST }} 22; then echo "SSH ready"; exit 0; fi
            echo "waiting for SSH ($i)..."; sleep 5
          done
          echo "SSH not reachable after timeout"; exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/el-campeon-web
            git pull --ff-only || true
            docker compose -f docker-compose.prod.yml pull front
            docker compose -f docker-compose.prod.yml up -d front
            docker image prune -f

      - name: Close SSH for this runner
        if: always() && steps.ssh_open.outputs.cidr != ''
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SG_ID" \
            --protocol tcp --port 22 --cidr "${{ steps.ssh_open.outputs.cidr }}" \
            || echo "revoke failed (rule may already be gone)"
